<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance & Business Calculators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Navy blue theme with yellow glowing buttons */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
            min-height: 100vh;
        }
        
        /* Custom scrollbar styles */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 58, 138, 0.3);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #facc15;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #fde047;
        }
        
        /* Tab styles with navy theme */
        .tab-active {
            background: linear-gradient(to right, #facc15, #fde047);
            color: #1e3a8a;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.6);
            border: 2px solid #fde047;
        }
        
        .tab-btn {
            background: rgba(30, 58, 138, 0.8);
            border: 2px solid rgba(250, 204, 21, 0.3);
            color: white;
            text-shadow: 0 0 1px black;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .tab-btn:hover {
            background: #facc15;
            color: #1e3a8a;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.5);
            transform: translateY(-2px);
        }
        
        /* Yellow glowing button styles */
        .yellow-glow-btn {
            background: linear-gradient(135deg, #facc15, #fde047);
            color: #1e3a8a;
            border: 2px solid #fde047;
            font-weight: bold;
            text-shadow: 0 0 1px black;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.5);
            transition: all 0.3s ease;
        }
        
        .yellow-glow-btn:hover {
            background: linear-gradient(135deg, #fde047, #facc15);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.8);
            transform: translateY(-2px);
        }
        
        /* Card styles with navy theme */
        .navy-card {
            background: rgba(30, 58, 138, 0.8);
            border: 2px solid rgba(250, 204, 21, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* Input styles */
        .navy-input {
            background: rgba(30, 58, 138, 0.6);
            border: 2px solid rgba(250, 204, 21, 0.3);
            color: white;
            placeholder-color: rgba(147, 197, 253, 0.7);
        }
        
        .navy-input:focus {
            border-color: #facc15;
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
        }
        
        /* Label styles */
        .navy-label {
            color: #93c5fd;
            font-weight: 600;
            text-shadow: 0 0 1px black;
        }
        
        /* Animation styles */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }
            50% { box-shadow: 0 0 25px rgba(250, 204, 21, 0.8); }
        }
        
        .glow-animation {
            animation: glow 2s infinite;
        }
        
        /* Text outline styles */
        .white-outline {
            color: white;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        .white-outline-thin {
            color: white;
            text-shadow: -0.5px -0.5px 0 rgba(0,0,0,0.8), 0.5px -0.5px 0 rgba(0,0,0,0.8), -0.5px 0.5px 0 rgba(0,0,0,0.8), 0.5px 0.5px 0 rgba(0,0,0,0.8);
        }
        
        /* Result box styles */
        .result-box {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid rgba(34, 197, 94, 0.5);
            backdrop-filter: blur(5px);
        }
        
        .result-box-blue {
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid rgba(59, 130, 246, 0.5);
            backdrop-filter: blur(5px);
        }
        
        .result-box-orange {
            background: rgba(251, 146, 60, 0.2);
            border: 2px solid rgba(251, 146, 60, 0.5);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="flex justify-center items-center gap-3 mb-4">
                <svg class="w-10 h-10 text-yellow-400 drop-shadow-lg glow-animation" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
                <h1 class="text-4xl font-bold white-outline glow-animation">Finance & Business Calculators</h1>
            </div>
            <p class="text-lg white-outline-thin max-w-2xl mx-auto">
                Comprehensive financial tools for interest calculations, loans, investments, taxes, and business metrics
            </p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex flex-wrap gap-2 mb-8 justify-center">
            <button onclick="switchTab('interest')" id="tab-interest" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium tab-active">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    Interest
                </span>
            </button>
            <button onclick="switchTab('emi')" id="tab-emi" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                    </svg>
                    EMI/Loan
                </span>
            </button>
            <button onclick="switchTab('sip')" id="tab-sip" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    SIP/MF
                </span>
            </button>
            <button onclick="switchTab('gst')" id="tab-gst" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    GST/Tax
                </span>
            </button>
            <button onclick="switchTab('discount')" id="tab-discount" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Discount
                </span>
            </button>
            <button onclick="switchTab('currency')" id="tab-currency" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path>
                    </svg>
                    Currency
                </span>
            </button>
            <button onclick="switchTab('roi')" id="tab-roi" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    ROI
                </span>
            </button>
            <button onclick="switchTab('inflation')" id="tab-inflation" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Inflation
                </span>
            </button>
        </div>

        <!-- Content Area -->
        <div id="content-area" class="fade-in">
            <!-- Content will be dynamically loaded here -->
        </div>

        <!-- Footer -->
        <div class="text-center mt-12 white-outline-thin">
            <p class="text-sm">
                All calculations are for informational purposes only. Please consult with financial professionals for important decisions.
            </p>
        </div>
    </div>

    <script>
        // Global state
        let currentTab = 'interest';
        
        // Mock exchange rates
        const mockRates = {
            USD: { EUR: 0.92, GBP: 0.79, JPY: 149.50, INR: 83.12, AUD: 1.53, CAD: 1.36, CHF: 0.88, CNY: 7.24, SGD: 1.35, HKD: 7.83 },
            EUR: { USD: 1.09, GBP: 0.86, JPY: 162.89, INR: 90.45, AUD: 1.67, CAD: 1.48, CHF: 0.96, CNY: 7.88, SGD: 1.47, HKD: 8.53 },
            GBP: { USD: 1.27, EUR: 1.16, JPY: 189.23, INR: 105.12, AUD: 1.94, CAD: 1.72, CHF: 1.11, CNY: 9.16, SGD: 1.71, HKD: 9.91 },
            INR: { USD: 0.012, EUR: 0.011, GBP: 0.0095, JPY: 1.80, AUD: 0.018, CAD: 0.016, CHF: 0.011, CNY: 0.087, SGD: 0.016, HKD: 0.094 },
            JPY: { USD: 0.0067, EUR: 0.0061, GBP: 0.0053, INR: 0.56, AUD: 0.010, CAD: 0.0091, CHF: 0.0059, CNY: 0.048, SGD: 0.0090, HKD: 0.052 }
        };

        // Currency formatter
        function formatCurrency(amount, currency = 'INR') {
            const symbols = {
                USD: '$', EUR: '€', GBP: '£', JPY: '¥', INR: '₹',
                AUD: 'A$', CAD: 'C$', CHF: 'Fr', CNY: '¥', SGD: 'S$', HKD: 'HK$'
            };
            
            if (currency === 'JPY' || currency === 'CNY') {
                return `${symbols[currency] || currency}${amount.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}`;
            }
            
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab styles
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
            });
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            
            // Load content
            loadContent(tab);
        }

        // Load content based on tab
        function loadContent(tab) {
            const contentArea = document.getElementById('content-area');
            contentArea.classList.remove('fade-in');
            
            setTimeout(() => {
                switch(tab) {
                    case 'interest':
                        contentArea.innerHTML = getInterestCalculatorHTML();
                        break;
                    case 'emi':
                        contentArea.innerHTML = getEMICalculatorHTML();
                        break;
                    case 'sip':
                        contentArea.innerHTML = getSIPCalculatorHTML();
                        break;
                    case 'gst':
                        contentArea.innerHTML = getGSTCalculatorHTML();
                        break;
                    case 'discount':
                        contentArea.innerHTML = getDiscountCalculatorHTML();
                        break;
                    case 'currency':
                        contentArea.innerHTML = getCurrencyConverterHTML();
                        break;
                    case 'roi':
                        contentArea.innerHTML = getROICalculatorHTML();
                        break;
                    case 'inflation':
                        contentArea.innerHTML = getInflationCalculatorHTML();
                        break;
                }
                contentArea.classList.add('fade-in');
            }, 100);
        }

        // Interest Calculator HTML with navy theme
        function getInterestCalculatorHTML() {
            return `
                <div class="grid gap-6 md:grid-cols-2">
                    <!-- Simple Interest -->
                    <div class="navy-card rounded-lg p-6">
                        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2 white-outline">
                            <svg class="w-5 h-5 text-yellow-400 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                            </svg>
                            Simple Interest Calculator
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Principal Amount (₹)</label>
                                <input type="number" id="simple-principal" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="10000">
                            </div>
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Annual Interest Rate (%)</label>
                                <input type="number" id="simple-rate" step="0.1" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="8.5">
                            </div>
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Time Period (Years)</label>
                                <input type="number" id="simple-time" step="0.1" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="5">
                            </div>
                            <button onclick="calculateSimpleInterest()" class="yellow-glow-btn w-full py-2 px-4 rounded-md">
                                Calculate Simple Interest
                            </button>
                            <div id="simple-result" class="hidden result-box rounded-lg p-4">
                                <!-- Results will be inserted here -->
                            </div>
                        </div>
                    </div>

                    <!-- Compound Interest -->
                    <div class="navy-card rounded-lg p-6">
                        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2 white-outline">
                            <svg class="w-5 h-5 text-yellow-400 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                            </svg>
                            Compound Interest Calculator
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Principal Amount (₹)</label>
                                <input type="number" id="compound-principal" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="10000">
                            </div>
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Annual Interest Rate (%)</label>
                                <input type="number" id="compound-rate" step="0.1" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="8.5">
                            </div>
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Time Period (Years)</label>
                                <input type="number" id="compound-time" step="0.1" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="5">
                            </div>
                            <div>
                                <label class="navy-label block text-sm font-medium mb-1">Compounding Frequency</label>
                                <select id="compound-frequency" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none">
                                    <option value="1">Annually</option>
                                    <option value="2">Semi-Annually</option>
                                    <option value="4">Quarterly</option>
                                    <option value="12">Monthly</option>
                                    <option value="365">Daily</option>
                                </select>
                            </div>
                            <button onclick="calculateCompoundInterest()" class="yellow-glow-btn w-full py-2 px-4 rounded-md">
                                Calculate Compound Interest
                            </button>
                            <div id="compound-result" class="hidden result-box-blue rounded-lg p-4">
                                <!-- Results will be inserted here -->
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // EMI Calculator HTML with navy theme
        function getEMICalculatorHTML() {
            return `
                <div class="navy-card rounded-lg p-6">
                    <h3 class="text-xl font-semibold mb-4 flex items-center gap-2 white-outline">
                        <svg class="w-5 h-5 text-yellow-400 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                        </svg>
                        EMI Calculator
                    </h3>
                    <div class="grid gap-4 md:grid-cols-3 mb-6">
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Loan Amount (₹)</label>
                            <input type="number" id="loan-principal" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="1000000">
                        </div>
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Interest Rate (% per annum)</label>
                            <input type="number" id="loan-rate" step="0.1" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="8.5">
                        </div>
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Loan Tenure (Years)</label>
                            <input type="number" id="loan-tenure" step="0.5" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="20">
                        </div>
                    </div>
                    <button onclick="calculateEMI()" class="yellow-glow-btn w-full py-2 px-4 rounded-md mb-6">
                        Calculate EMI
                    </button>
                    <div id="emi-result" class="hidden">
                        <!-- Results will be inserted here -->
                    </div>
                </div>
            `;
        }

        // SIP Calculator HTML with navy theme
        function getSIPCalculatorHTML() {
            return `
                <div class="navy-card rounded-lg p-6">
                    <h3 class="text-xl font-semibold mb-4 flex items-center gap-2 white-outline">
                        <svg class="w-5 h-5 text-yellow-400 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        SIP Calculator
                    </h3>
                    <div class="grid gap-4 md:grid-cols-3 mb-6">
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Monthly Investment (₹)</label>
                            <input type="number" id="sip-amount" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="5000">
                        </div>
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Expected Return Rate (% per annum)</label>
                            <input type="number" id="sip-rate" step="0.1" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="12">
                        </div>
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Investment Period (Years)</label>
                            <input type="number" id="sip-period" step="0.5" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="10">
                        </div>
                    </div>
                    <button onclick="calculateSIP()" class="yellow-glow-btn w-full py-2 px-4 rounded-md mb-6">
                        Calculate SIP Returns
                    </button>
                    <div id="sip-result" class="hidden">
                        <!-- Results will be inserted here -->
                    </div>
                </div>
            `;
        }

        // GST Calculator HTML with navy theme
        function getGSTCalculatorHTML() {
            return `
                <div class="navy-card rounded-lg p-6">
                    <h3 class="text-xl font-semibold mb-4 flex items-center gap-2 white-outline">
                        <svg class="w-5 h-5 text-yellow-400 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        GST Calculator
                    </h3>
                    <div class="grid gap-4 md:grid-cols-3 mb-6">
                        <div>
                            <label class="navy-label block text-sm font-medium mb-1">Amount (₹)</label>
                            <input type="number" id="gst-amount" class="navy-input w-full px-3 py-2 rounded-md focus:outline-none" placeholder="1000">
                        </div>

            if (isNaN(principal) || isNaN(rate) || isNaN(time)) {
                alert('Please enter valid numbers');

            const interest = (principal * rate * time) / 100;
            const total = principal + interest;

            const resultDiv = document.getElementById('simple-result');
            resultDiv.innerHTML = `
                <div class="space-y-2">

        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('compound-principal').value);
            const rate = parseFloat(document.getElementById('compound-rate').value);
            const time = parseFloat(document.getElementById('compound-time').value);
            const frequency = parseFloat(document.getElementById('compound-frequency').value);

            if (isNaN(principal) || isNaN(rate) || isNaN(time) || isNaN(frequency)) {
                alert('Please enter valid numbers');
                return;
            }

            const amount = principal * Math.pow((1 + rate / (100 * frequency)), frequency * time);
            const interest = amount - principal;

            const resultDiv = document.getElementById('compound-result');
            resultDiv.innerHTML = `
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-sm font-medium white-outline-thin">Interest Earned:</span>
                        <span class="text-green-400 font-bold">${formatCurrency(interest)}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-sm font-medium white-outline-thin">Total Amount:</span>
                        <span class="text-blue-400 font-bold">${formatCurrency(amount)}</span>
                    </div>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        function calculateEMI() {
            const principal = parseFloat(document.getElementById('loan-principal').value);
            const rate = parseFloat(document.getElementById('loan-rate').value);
            const tenure = parseFloat(document.getElementById('loan-tenure').value);

            if (isNaN(principal) || isNaN(rate) || isNaN(tenure)) {
                alert('Please enter valid numbers');
                return;
            }

            const monthlyRate = rate / 12 / 100;
            const months = tenure * 12;
            const emi = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            const totalAmount = emi * months;
            const totalInterest = totalAmount - principal;

            const resultDiv = document.getElementById('emi-result');
            resultDiv.innerHTML = `

        function calculateGST() {
            const amount = parseFloat(document.getElementById('gst-amount').value);
            const rate = parseFloat(document.getElementById('gst-rate').value);
            const type = document.getElementById('gst-type').value;

            if (isNaN(amount) || isNaN(rate)) {
                alert('Please enter valid numbers');
                return;
            }

            let originalAmount, gstAmount, totalAmount;

            if (type === 'exclusive') {
                originalAmount = amount;
                gstAmount = (amount * rate) / 100;
                totalAmount = originalAmount + gstAmount;
            } else {
                totalAmount = amount;
                originalAmount = (amount * 100) / (100 + rate);
                gstAmount = totalAmount - originalAmount;
            }

            const resultDiv = document.getElementById('gst-result');
            resultDiv.innerHTML = `

        function getExchangeRate(from, to) {
            if (from === to) return 1;
            if (mockRates[from] && mockRates[from][to]) {
                return mockRates[from][to];
            } else if (mockRates[to] && mockRates[to][from]) {
                return 1 / mockRates[to][from];
            } else if (from !== 'USD' && to !== 'USD' && mockRates[from] && mockRates[from]['USD'] && mockRates['USD'] && mockRates['USD'][to]) {
                return mockRates[from]['USD'] * mockRates['USD'][to];
            }
            return null;
        }

            const amount = parseFloat(document.getElementById('currency-amount').value);
            const fromCurrency = document.getElementById('from-currency').value;
            const toCurrency = document.getElementById('to-currency').value;

                alert('Please enter a valid amount');
                return;

                alert('Exchange rate not available for this currency pair');
                return;

            const convertedAmount = amount * rate;

            const resultDiv = document.getElementById('currency-result');
            resultDiv.innerHTML = `

                        </div>
                    </div>
                    <div class="text-center text-xs white-outline-thin">
                        <p>Exchange rates are for demonstration purposes only</p>
                    </div>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        function swapCurrencies() {
            const fromCurrency = document.getElementById('from-currency');
            const toCurrency = document.getElementById('to-currency');
            const temp = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = temp;
        }

        function calculateROI() {
            const initial = parseFloat(document.getElementById('roi-initial').value);
            const final = parseFloat(document.getElementById('roi-final').value);
            const years = parseFloat(document.getElementById('roi-years').value);

            if (isNaN(initial) || isNaN(final) || isNaN(years) || initial <= 0) {
                alert('Please enter valid numbers');
                return;
            }

            const profit = final - initial;
            const roiPercentage = (profit / initial) * 100;
            const annualizedROI = (Math.pow(final / initial, 1 / years) - 1) * 100;

            const resultDiv = document.getElementById('roi-result');
            resultDiv.innerHTML = `
                <div class="grid gap-4 md:grid-cols-2">
                    <div class="text-center p-4 result-box rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Total Profit/Loss</p>
                        <p class="text-2xl font-bold ${profit >= 0 ? 'text-green-400' : 'text-red-400'}">${formatCurrency(profit)}</p>
                    </div>
                    <div class="text-center p-4 result-box-blue rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Total ROI</p>
                        <p class="text-2xl font-bold ${roiPercentage >= 0 ? 'text-green-400' : 'text-red-400'}">${roiPercentage.toFixed(2)}%</p>
                    </div>
                    <div class="text-center p-4 bg-purple-500/20 border-2 border-purple-400/50 rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Annualized ROI</p>
                        <p class="text-2xl font-bold ${annualizedROI >= 0 ? 'text-blue-400' : 'text-red-400'}">${annualizedROI.toFixed(2)}%</p>
                    </div>
                    <div class="text-center p-4 bg-gray-500/20 border-2 border-gray-400/50 rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Investment Period</p>
                        <p class="text-2xl font-bold text-gray-300">${years} years</p>
                    </div>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        function calculateInflation() {
            const amount = parseFloat(document.getElementById('inflation-present').value);
            const rate = parseFloat(document.getElementById('inflation-rate').value) / 100;
            const years = parseFloat(document.getElementById('inflation-years').value);

            if (isNaN(amount) || isNaN(rate) || isNaN(years)) {
                alert('Please enter valid numbers');
                return;
            }

            const futureValue = amount * Math.pow(1 + rate, years);
            const totalInflation = futureValue - amount;
            const purchasingPowerLoss = ((futureValue - amount) / futureValue) * 100;

            const resultDiv = document.getElementById('inflation-result');
            resultDiv.innerHTML = `
                <div class="grid gap-4 md:grid-cols-2">
                    <div class="text-center p-4 result-box-blue rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Present Value</p>
                        <p class="text-2xl font-bold text-blue-400">${formatCurrency(amount)}</p>
                    </div>
                    <div class="text-center p-4 result-box-orange rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Future Value Needed</p>
                        <p class="text-2xl font-bold text-orange-400">${formatCurrency(futureValue)}</p>
                    </div>
                    <div class="text-center p-4 result-box-orange rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Total Inflation Impact</p>
                        <p class="text-2xl font-bold text-orange-400">${formatCurrency(totalInflation)}</p>
                    </div>
                    <div class="text-center p-4 result-box-orange rounded-lg">
                        <p class="text-sm white-outline-thin mb-1">Purchasing Power Loss</p>
                        <p class="text-2xl font-bold text-red-400">${purchasingPowerLoss.toFixed(2)}%</p>
                    </div>
                </div>
                <div class="mt-4 text-center p-3 result-box-orange rounded-lg">
                    <p class="text-sm white-outline-thin">Due to ${(rate * 100).toFixed(1)}% inflation over ${years} years, you'll need <span class="font-semibold text-orange-400">${formatCurrency(futureValue)}</span> to have the same purchasing power as <span class="font-semibold text-blue-400">${formatCurrency(amount)}</span> today.</p>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadContent('interest');
        });
    </script>
</body>
</html>
